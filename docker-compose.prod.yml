services:
  postgres:
    image: postgres:15-alpine
    container_name: womanday_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-womanday}
      POSTGRES_USER: ${POSTGRES_USER:-womanday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-womanday} -d ${POSTGRES_DB:-womanday}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - womanday

  redis:
    image: redis:7-alpine
    container_name: womanday_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - womanday

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: womanday_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-womanday}:${POSTGRES_PASSWORD:-secret_change_me}@postgres:5432/${POSTGRES_DB:-womanday}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-womandayspin2026_CHANGE_THIS_IN_PROD}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      API_PORT: "3001"
      API_HOST: "0.0.0.0"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://womanday.nhatquy.com}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-15728640}
      WAITING_TIMER_MS: ${WAITING_TIMER_MS:-30000}
      COUNTDOWN_SECONDS: ${COUNTDOWN_SECONDS:-30}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - womanday

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://womanday.nhatquy.com}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://womanday.nhatquy.com}
    container_name: womanday_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://womanday.nhatquy.com}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://womanday.nhatquy.com}
    networks:
      - womanday

  nginx:
    image: nginx:alpine
    container_name: womanday_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - womanday

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  womanday:
    driver: bridge
